<svg width="1200" height="300" viewBox="0 0 1200 300" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="CertSecure Demo banner">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="300" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0B1220"/>
      <stop offset="1" stop-color="#0F2A2A"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#22C55E" stop-opacity="0.9"/>
      <stop offset="1" stop-color="#14B8A6" stop-opacity="0.9"/>
    </linearGradient>
    <filter id="blur" x="-40" y="-40" width="1280" height="380" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="20"/>
    </filter>
  </defs>

  <rect width="1200" height="300" fill="url(#bg)"/>

  <!-- soft accent blobs -->
  <circle cx="180" cy="120" r="110" fill="url(#accent)" opacity="0.35" filter="url(#blur)"/>
  <circle cx="1040" cy="220" r="140" fill="url(#accent)" opacity="0.28" filter="url(#blur)"/>

  <!-- thin grid -->
  <g opacity="0.18" stroke="#E5E7EB">
    <path d="M0 60H1200"/>
    <path d="M0 120H1200"/>
    <path d="M0 180H1200"/>
    <path d="M0 240H1200"/>
    <path d="M120 0V300"/>
    <path d="M240 0V300"/>
    <path d="M360 0V300"/>
    <path d="M480 0V300"/>
    <path d="M600 0V300"/>
    <path d="M720 0V300"/>
    <path d="M840 0V300"/>
    <path d="M960 0V300"/>
    <path d="M1080 0V300"/>
  </g>

  <!-- title -->
  <g transform="translate(84 88)">
    <text x="0" y="0" fill="#F9FAFB" font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial" font-size="48" font-weight="800" letter-spacing="-0.02em">
      CertSecure Demo
    </text>
    <text x="0" y="44" fill="#D1D5DB" font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial" font-size="18" font-weight="500">
      Certificate upload, verification, and role-based dashboards (Next.js + Firebase)
    </text>

    <!-- pill -->
    <g transform="translate(0 78)">
      <rect x="0" y="0" rx="18" ry="18" width="410" height="36" fill="#111827" opacity="0.75" stroke="#334155"/>
      <text x="14" y="24" fill="#E5E7EB" font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial" font-size="14" font-weight="600">
        Dev server: http://localhost:9002
      </text>
    </g>
  </g>

  <!-- simple shield mark -->
  <g transform="translate(1020 64)" opacity="0.95">
    <path d="M80 0L140 22V84C140 132 110 170 80 184C50 170 20 132 20 84V22L80 0Z" fill="#0B1220" stroke="url(#accent)" stroke-width="3"/>
    <path d="M80 34C62 34 48 48 48 66V88C48 106 62 120 80 120C98 120 112 106 112 88V66C112 48 98 34 80 34Z" fill="url(#accent)" opacity="0.35"/>
    <path d="M64 76L76 88L100 60" stroke="#F9FAFB" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
</svg>
